spring:
  application:
    name: lockbox
  
  profiles:
    active: dev # Default to dev so you don't accidentally create folders
    
  main:
    banner-mode: CONSOLE
    log-startup-info: false

  shell:
    interactive:
      enabled: true

  sql:
    init:
      mode: always
      platform: sqlite
      
  data:
    jdbc:
      repositories:
        enabled: true

logging:
  pattern:
    console: "%clr(%msg){faint}%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"